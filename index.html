function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1]);}
function stats(){return JSON.parse(localStorage.getItem("stats")||"{}")}function saveStats(s){localStorage.setItem("stats",JSON.stringify(s))}
function qid(q){return QUESTION_BANK.findIndex(x=>x.question===q.question)}
function toggleDark(){document.body.classList.toggle("dark");localStorage.setItem("dark",document.body.classList.contains("dark")?"1":"0")}
if(localStorage.getItem("dark")==="1")document.body.classList.add("dark");
function renderDash(){let s=stats(),keys=Object.keys(s),answered=keys.reduce((a,k)=>a+s[k].right+s[k].wrong,0),missed=keys.filter(k=>s[k].missed).length,fav=keys.filter(k=>s[k].fav).length;let mmKeys=keys.filter(k=>["Mechanical","Auto & Shop","Electronics"].includes(s[k].section));let mmR=mmKeys.reduce((a,k)=>a+s[k].right,0),mmT=mmKeys.reduce((a,k)=>a+s[k].right+s[k].wrong,0);let mmAcc=mmT?Math.round(mmR/mmT*100):0;let estimate=Math.min(99,Math.round(80+mmAcc*.2));document.getElementById("dash").innerHTML=`<div class='stat'>Answered<br><b>${answered}</b></div><div class='stat'>Missed Review<br><b>${missed}</b></div><div class='stat'>Favorites<br><b>${fav}</b></div><div class='stat'>MM Accuracy<br><b>${mmAcc}%</b></div><div class='stat'>MM Estimate<br><b>${estimate}</b><br><span class='small'>rough tracker</span></div><div class='stat'>Goal<br><b>95+</b></div>`}
function startMode(m,topic=null){mode=m;currentTopic=topic;answers=JSON.parse(localStorage.getItem("ans_"+m+(topic||""))||"{}");let bank=QUESTION_BANK.slice();if(m==="mm")bank=bank.filter(q=>["Mechanical","Auto & Shop","Electronics"].includes(q.section));if(m==="topic")bank=bank.filter(q=>q.topic===topic);if(m==="missed"){let s=stats();bank=bank.filter(q=>s[qid(q)]?.missed)}if(m==="favorites"){let s=stats();bank=bank.filter(q=>s[qid(q)]?.fav)}if(bank.length===0){alert("No questions here yet.");return}active=shuffle(bank);document.getElementById("home").classList.add("hidden");document.getElementById("academy").classList.add("hidden");document.getElementById("controls").classList.remove("hidden");document.getElementById("subtitle").textContent=m==="test"?"Test Mode":m==="mm"?"Mechanical/MM Focus":m==="topic"?topic:m==="missed"?"Review Missed":m==="favorites"?"Favorites":"Practice Mode";document.getElementById("gradeBtn").style.display=m==="test"?"inline-block":"none";document.getElementById("help").textContent=m==="test"?"Answers stay hidden until you tap Grade Test.":"Tap an answer and you get feedback immediately.";document.getElementById("result").textContent="Not graded yet.";render()}
function showAcademy(){let topics=[...new Set(QUESTION_BANK.filter(q=>["Mechanical","Auto & Shop","Electronics"].includes(q.section)).map(q=>q.topic))].sort();document.getElementById("home").classList.add("hidden");document.getElementById("academy").classList.remove("hidden");document.getElementById("academyBtns").innerHTML=topics.map(t=>`<button onclick="startMode('topic','${esc(t)}')"><b>${esc(t)}</b><br><span class='small'>Practice this topic only</span></button>`).join("");}
function goHome(){document.getElementById("quiz").innerHTML="";document.getElementById("controls").classList.add("hidden");document.getElementById("academy").classList.add("hidden");document.getElementById("home").classList.remove("hidden");document.getElementById("subtitle").textContent="MM 95+ goal • scrolling study app";document.getElementById("bar").style.width="0%";renderDash()}
function render(){let quiz=document.getElementById("quiz");quiz.innerHTML="";active.forEach((item,idx)=>{let n=idx+1,choices="";item.choices.forEach((c,ci)=>{let L=letters[ci];choices+=`<label class="choice"><input type="radio" name="q${n}" value="${L}" ${answers[n]===L?"checked":""}> <span><b>${L}.</b> ${esc(c)}</span></label>`});let card=document.createElement("section");card.className="card";card.id="qcard"+n;let s=stats(),id=qid(item),star=s[id]?.fav?"★":"☆";card.innerHTML=`<button type='button' class='fav' onclick='toggleFav(${n})'>${star}</button><div class="section">${esc(item.section)}</div><div class="topic">${esc(item.topic)}</div><div class="q">${n}. ${esc(item.question)}</div>${choices}<div class="feedback" id="fb${n}"></div>`;quiz.appendChild(card)});updateProgress();if(mode!=="test")Object.keys(answers).forEach(k=>showFeedback(Number(k),true))}
document.addEventListener("change",e=>{if(!e.target.matches("input[type=radio]"))return;let n=e.target.name.replace("q","");answers[n]=e.target.value;localStorage.setItem("ans_"+mode+(currentTopic||""),JSON.stringify(answers));updateProgress();if(mode!=="test")showFeedback(Number(n),false);});
function record(n){let q=active[n-1],p=answers[n],id=qid(q),s=stats();if(!s[id])s[id]={right:0,wrong:0,missed:false,fav:false,section:q.section,topic:q.topic};if(p===q.answer){s[id].right++;s[id].missed=false}else{s[id].wrong++;s[id].missed=true}saveStats(s)}
function showFeedback(n,skipRecord){let q=active[n-1],p=answers[n],fb=document.getElementById("fb"+n);if(!p||!fb)return;if(!skipRecord)record(n);if(p===q.answer){fb.className="feedback correct";fb.innerHTML=`Correct.<br><b>Why:</b> ${esc(q.explanation)}<br><b>Memory tip:</b> ${esc(q.tip)}`}else{fb.className="feedback wrong";fb.innerHTML=`Incorrect. Correct answer: <b>${q.answer}</b>.<br><b>Why:</b> ${esc(q.explanation)}<br><b>Memory tip:</b> ${esc(q.tip)}`}}
function toggleFav(n){let q=active[n-1],id=qid(q),s=stats();if(!s[id])s[id]={right:0,wrong:0,missed:false,fav:false,section:q.section,topic:q.topic};s[id].fav=!s[id].fav;saveStats(s);render()}
function updateProgress(){document.getElementById("bar").style.width=(Object.keys(answers).length/Math.max(active.length,1)*100)+"%"}
function gradeTest(){let score=0,sections={};active.forEach((q,idx)=>{let n=idx+1,p=answers[n]||"";if(!sections[q.section])sections[q.section]={right:0,total:0};sections[q.section].total++;if(p===q.answer){score++;sections[q.section].right++}showFeedback(n,false)});let out=`<b>Score: ${score}/${active.length} (${Math.round(score/active.length*100)}%)</b><table><tr><th>Section</th><th>Score</th></tr>`;Object.keys(sections).forEach(s=>out+=`<tr><td>${esc(s)}</td><td>${sections[s].right}/${sections[s].total}</td></tr>`);document.getElementById("result").innerHTML=out+"</table>";window.scrollTo({top:0,behavior:"smooth"})}
function clearMode(){if(!confirm("Clear this mode's saved answers?"))return;answers={};localStorage.removeItem("ans_"+mode+(currentTopic||""));render();document.getElementById("result").textContent="Not graded yet."}
function jumpMissed(){for(let i=1;i<=active.length;i++){if((answers[i]||"")!==active[i-1].answer){document.getElementById("qcard"+i).scrollIntoView({behavior:"smooth",block:"start"});return}}alert("No missed or blank questions found.")}
function resetAll(){if(!confirm("Reset all app progress on this phone?"))return;localStorage.clear();location.reload()}
renderDash();
</script>
</body></html>
